services:
  postgres:
    image: postgres:13
    ports:
      - "5432:5432"
    volumes:
      - ./../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    env_file:
      - ../.env
    networks:
      - backend
    restart: always

  python-app:
    build: ../
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file:
      - ../.env
    networks:
      - backend
    command: sh -c "sleep 5 && cd auth_service && uvicorn main:app --host 0.0.0.0 --port 8000"

networks:
  backend:
    driver: bridge
